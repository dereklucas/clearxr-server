# CloudXR Runtime Configuration
# This file configures the CloudXR OpenXR runtime behavior

apiVersion: cloudxr.nvidia.com/v1beta1
kind: OpenXRRuntimeConfiguration

# Feature flags control various runtime features
featureFlags:
  deviceProfile: apple-vision-pro          # See: https://docs.nvidia.com/cloudxr-sdk/latest/usr_guide/cloudxr_runtime/runtime_mgmt_api.html#device-profile
  runtimeFoveation: true                   # Enable foveated streaming.
  runtimeFoveationUnwarpedWidth: 6600     # Unwarped render width for foveation
  runtimeFoveationWarpedWidth: 2640
  runtimeFoveationInset: 40
  disableAlpha: true                       # Disable alpha channel encoding in the video stream. For applications that don’t use transparency, disabling alpha can save encoding time and bandwidth.
  audioStreaming: true                     # Enablse audio streaming from the server to the client.
  
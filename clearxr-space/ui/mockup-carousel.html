<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>ClearXR - Game Launcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a14;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .viewport {
    width: 1024px;
    height: 640px;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(0, 229, 255, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 80%, rgba(255, 68, 204, 0.04) 0%, transparent 50%),
      #0a0a14;
    overflow: hidden;
  }

  /* Header */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 32px;
    z-index: 10;
  }

  .wordmark {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
  }

  .game-count {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 1px;
  }

  /* Carousel Stage */
  .carousel-stage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -54%);
    width: 900px;
    height: 400px;
    perspective: 1200px;
  }

  .carousel-track {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: none;
  }

  /* Game Card */
  .game-card {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 400px;
    height: 250px;
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1),
                opacity 0.5s cubic-bezier(0.25, 0.8, 0.25, 1),
                filter 0.5s cubic-bezier(0.25, 0.8, 0.25, 1),
                box-shadow 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    transform-style: preserve-3d;
    backface-visibility: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .game-card.center {
    transform: translate(-50%, -50%) translateZ(0px) rotateY(0deg) scale(1);
    opacity: 1;
    filter: brightness(1);
    z-index: 5;
    box-shadow:
      0 0 60px rgba(0, 229, 255, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.5);
    border-color: rgba(0, 229, 255, 0.25);
  }

  .game-card.left-1 {
    transform: translate(calc(-50% - 340px), -50%) translateZ(-120px) rotateY(18deg) scale(0.78);
    opacity: 0.65;
    filter: brightness(0.55);
    z-index: 4;
  }

  .game-card.left-2 {
    transform: translate(calc(-50% - 540px), -50%) translateZ(-240px) rotateY(28deg) scale(0.6);
    opacity: 0.3;
    filter: brightness(0.35);
    z-index: 3;
  }

  .game-card.left-3 {
    transform: translate(calc(-50% - 660px), -50%) translateZ(-360px) rotateY(35deg) scale(0.45);
    opacity: 0;
    filter: brightness(0.2);
    z-index: 2;
  }

  .game-card.right-1 {
    transform: translate(calc(-50% + 340px), -50%) translateZ(-120px) rotateY(-18deg) scale(0.78);
    opacity: 0.65;
    filter: brightness(0.55);
    z-index: 4;
  }

  .game-card.right-2 {
    transform: translate(calc(-50% + 540px), -50%) translateZ(-240px) rotateY(-28deg) scale(0.6);
    opacity: 0.3;
    filter: brightness(0.35);
    z-index: 3;
  }

  .game-card.right-3 {
    transform: translate(calc(-50% + 660px), -50%) translateZ(-360px) rotateY(-35deg) scale(0.45);
    opacity: 0;
    filter: brightness(0.2);
    z-index: 2;
  }

  .game-card.hidden {
    transform: translate(-50%, -50%) translateZ(-500px) scale(0.3);
    opacity: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Card Art */
  .card-art {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .card-art::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 65%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
  }

  /* Card Content */
  .card-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 24px;
    z-index: 2;
  }

  .card-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  .card-desc {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 14px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease 0.1s, transform 0.4s ease 0.1s;
  }

  .game-card.center .card-desc {
    opacity: 1;
    transform: translateY(0);
  }

  .launch-btn {
    display: inline-block;
    padding: 8px 28px;
    background: linear-gradient(135deg, #00e5ff, #00b8d4);
    color: #0a0a14;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease 0.15s, transform 0.4s ease 0.15s,
                box-shadow 0.25s ease, background 0.25s ease;
    box-shadow: 0 4px 20px rgba(0, 229, 255, 0.25);
  }

  .game-card.center .launch-btn {
    opacity: 1;
    transform: translateY(0);
  }

  .launch-btn:hover {
    box-shadow: 0 4px 30px rgba(0, 229, 255, 0.45);
    background: linear-gradient(135deg, #33ebff, #00e5ff);
  }

  /* Navigation Arrows */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-60%);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.5);
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 20;
    transition: border-color 0.3s, color 0.3s, box-shadow 0.3s, background 0.3s;
    user-select: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .nav-arrow:hover {
    border-color: rgba(0, 229, 255, 0.5);
    color: #00e5ff;
    box-shadow: 0 0 24px rgba(0, 229, 255, 0.2);
    background: rgba(0, 229, 255, 0.06);
  }

  .nav-arrow.left { left: 20px; }
  .nav-arrow.right { right: 20px; }

  .nav-arrow svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Dots Indicator */
  .dots {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    cursor: pointer;
    transition: background 0.4s, box-shadow 0.4s, transform 0.4s;
  }

  .dot.active {
    background: #00e5ff;
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    transform: scale(1.25);
  }

  .dot:hover:not(.active) {
    background: rgba(255, 255, 255, 0.35);
  }

  /* Ambient glow behind center card */
  .ambient-glow {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 300px;
    border-radius: 50%;
    opacity: 0.2;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    transition: background 0.6s ease;
  }
</style>
</head>
<body>

<div class="viewport">
  <div class="header">
    <div class="wordmark">CLEARXR</div>
    <div class="game-count"><span id="countDisplay">1 / 8</span> games</div>
  </div>

  <div class="ambient-glow" id="ambientGlow"></div>

  <div class="carousel-stage">
    <div class="carousel-track" id="carouselTrack"></div>
  </div>

  <div class="nav-arrow left" id="navLeft">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <div class="nav-arrow right" id="navRight">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
  </div>

  <div class="dots" id="dotsContainer"></div>
</div>

<script>
const games = [
  {
    title: "Neon Horizon",
    desc: "Race through cyberpunk cityscapes at impossible speeds",
    gradient: "linear-gradient(135deg, #00e5ff, #0052d4)"
  },
  {
    title: "Phantom Arena",
    desc: "Multiplayer combat in shifting interdimensional arenas",
    gradient: "linear-gradient(135deg, #ff44cc, #7b2ff7)"
  },
  {
    title: "Starfield Echo",
    desc: "Explore procedurally generated galaxies in zero gravity",
    gradient: "linear-gradient(135deg, #f7971e, #ffd200)"
  },
  {
    title: "Verdant Realms",
    desc: "Build and nurture living ecosystems with your hands",
    gradient: "linear-gradient(135deg, #11998e, #38ef7d)"
  },
  {
    title: "Abyss Walker",
    desc: "Descend into the deepest ocean trenches to uncover ancient secrets",
    gradient: "linear-gradient(135deg, #1a2980, #26d0ce)"
  },
  {
    title: "Crimson Forge",
    desc: "Craft legendary weapons in a volcanic blacksmith simulation",
    gradient: "linear-gradient(135deg, #cb2d3e, #ef473a)"
  },
  {
    title: "Lucid Architect",
    desc: "Shape dreamscapes into playable worlds using spatial gestures",
    gradient: "linear-gradient(135deg, #8e2de2, #4a00e0)"
  },
  {
    title: "Skyward Drift",
    desc: "Glide through floating islands on winds you control",
    gradient: "linear-gradient(135deg, #f953c6, #b91d73)"
  }
];

const track = document.getElementById('carouselTrack');
const dotsContainer = document.getElementById('dotsContainer');
const countDisplay = document.getElementById('countDisplay');
const ambientGlow = document.getElementById('ambientGlow');

let currentIndex = 0;
let isAnimating = false;

// Build cards
games.forEach((game, i) => {
  const card = document.createElement('div');
  card.className = 'game-card hidden';
  card.dataset.index = i;
  card.innerHTML = `
    <div class="card-art" style="background: ${game.gradient};">
      <div style="position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.3) 60%,transparent 100%);"></div>
    </div>
    <div class="card-content">
      <div class="card-title">${game.title}</div>
      <div class="card-desc">${game.desc}</div>
      <button class="launch-btn">LAUNCH</button>
    </div>
  `;
  track.appendChild(card);
});

// Build dots
games.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => goTo(i));
  dotsContainer.appendChild(dot);
});

const cards = track.querySelectorAll('.game-card');
const dots = dotsContainer.querySelectorAll('.dot');

function getPositionClass(offset) {
  if (offset === 0) return 'center';
  if (offset === 1) return 'right-1';
  if (offset === -1) return 'left-1';
  if (offset === 2) return 'right-2';
  if (offset === -2) return 'left-2';
  if (offset === 3) return 'right-3';
  if (offset === -3) return 'left-3';
  return 'hidden';
}

function updateCarousel() {
  const n = games.length;
  cards.forEach((card, i) => {
    // Calculate shortest distance around the ring
    let diff = i - currentIndex;
    if (diff > n / 2) diff -= n;
    if (diff < -n / 2) diff += n;

    card.className = 'game-card ' + getPositionClass(diff);
  });

  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === currentIndex);
  });

  countDisplay.textContent = `${currentIndex + 1} / ${games.length}`;

  // Update ambient glow to match center card gradient colors
  const glowColors = [
    'radial-gradient(circle, rgba(0,229,255,0.35), transparent)',
    'radial-gradient(circle, rgba(255,68,204,0.35), transparent)',
    'radial-gradient(circle, rgba(247,151,30,0.35), transparent)',
    'radial-gradient(circle, rgba(56,239,125,0.35), transparent)',
    'radial-gradient(circle, rgba(38,208,206,0.35), transparent)',
    'radial-gradient(circle, rgba(239,71,58,0.35), transparent)',
    'radial-gradient(circle, rgba(142,45,226,0.35), transparent)',
    'radial-gradient(circle, rgba(249,83,198,0.35), transparent)',
  ];
  ambientGlow.style.background = glowColors[currentIndex];
}

function goTo(index) {
  if (isAnimating || index === currentIndex) return;
  isAnimating = true;
  currentIndex = index;
  updateCarousel();
  setTimeout(() => { isAnimating = false; }, 500);
}

function navigate(dir) {
  if (isAnimating) return;
  const n = games.length;
  goTo((currentIndex + dir + n) % n);
}

document.getElementById('navLeft').addEventListener('click', () => navigate(-1));
document.getElementById('navRight').addEventListener('click', () => navigate(1));

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// Click side cards to navigate
track.addEventListener('click', (e) => {
  const card = e.target.closest('.game-card');
  if (!card) return;
  const idx = parseInt(card.dataset.index);
  if (idx !== currentIndex) goTo(idx);
});

// Initialize
updateCarousel();
</script>

</body>
</html>

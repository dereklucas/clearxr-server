<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=300">
<title>ClearXR System Tray</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a14;
    --surface: #13132a;
    --surface-hover: #1a1a3a;
    --accent: #4a9eff;
    --accent-dim: #3578cc;
    --accent-glow: rgba(74, 158, 255, 0.25);
    --text: #e4e4ee;
    --text-muted: #6a7088;
    --transition: 0.18s ease;
  }

  body {
    width: 300px;
    height: 300px;
    overflow: hidden;
    background: transparent;
    font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tray {
    position: relative;
    width: 280px;
    height: 280px;
    opacity: 0;
    transform: scale(0.8);
    animation: trayAppear 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes trayAppear {
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* SVG pie wedges */
  .tray-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .wedge-hit {
    fill: transparent;
    cursor: pointer;
  }

  .wedge-bg {
    fill: rgba(10, 10, 20, 0.92);
    stroke: #1e1e38;
    stroke-width: 1;
    transition: fill var(--transition);
    pointer-events: none;
  }

  .wedge-group:hover .wedge-bg {
    fill: rgba(26, 26, 58, 0.95);
    filter: drop-shadow(0 0 12px rgba(74, 158, 255, 0.2));
  }

  .wedge-group:active .wedge-bg {
    fill: rgba(35, 35, 70, 0.95);
  }

  .wedge-icon {
    pointer-events: none;
    font-size: 28px;
    fill: var(--text);
    text-anchor: middle;
    dominant-baseline: central;
    transition: fill var(--transition);
  }

  .wedge-group:hover .wedge-icon {
    fill: var(--accent);
  }

  /* Center circle */
  .center-bg {
    fill: rgba(10, 10, 20, 0.96);
    stroke: #1e1e38;
    stroke-width: 1;
  }

  .center-label {
    fill: var(--text-muted);
    font-size: 15px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: central;
    letter-spacing: 0.5px;
    transition: fill var(--transition);
    pointer-events: none;
  }

  .center-label.active {
    fill: var(--accent);
  }

  /* Outer ring glow */
  .ring-glow {
    fill: none;
    stroke: rgba(74, 158, 255, 0.08);
    stroke-width: 1;
    pointer-events: none;
  }

</style>
</head>
<body>

<div class="tray" id="tray">
  <svg class="tray-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="outerClip">
        <circle cx="140" cy="140" r="136"/>
      </clipPath>
      <clipPath id="innerClip">
        <path d="M0,0 H280 V280 H0 Z M140,140 m-44,0 a44,44 0 1,0 88,0 a44,44 0 1,0 -88,0" clip-rule="evenodd"/>
      </clipPath>
    </defs>

    <!-- Outer ring -->
    <circle class="ring-glow" cx="140" cy="140" r="137"/>

    <!-- Wedge group clipped to donut shape -->
    <g clip-path="url(#outerClip)">
      <g clip-path="url(#innerClip)">

        <!-- Home (top wedge: -45deg to -135deg, i.e. top) -->
        <g class="wedge-group" data-action="home" data-label="Home">
          <path class="wedge-bg" d="M140,140 L140,0 A140,140 0 0,0 0,140 Z"/>
          <path class="wedge-hit" d="M140,140 L140,0 A140,140 0 0,0 0,140 Z"/>
        </g>

        <!-- Desktop (right wedge) -->
        <g class="wedge-group" data-action="desktop" data-label="Desktop">
          <path class="wedge-bg" d="M140,140 L280,140 A140,140 0 0,0 140,0 Z"/>
          <path class="wedge-hit" d="M140,140 L280,140 A140,140 0 0,0 140,0 Z"/>
        </g>

        <!-- Settings (bottom wedge) -->
        <g class="wedge-group" data-action="settings" data-label="Settings">
          <path class="wedge-bg" d="M140,140 L140,280 A140,140 0 0,0 280,140 Z"/>
          <path class="wedge-hit" d="M140,140 L140,280 A140,140 0 0,0 280,140 Z"/>
        </g>

        <!-- Screenshot (left wedge) -->
        <g class="wedge-group" data-action="screenshot" data-label="Screenshot">
          <path class="wedge-bg" d="M140,140 L0,140 A140,140 0 0,0 140,280 Z"/>
          <path class="wedge-hit" d="M140,140 L0,140 A140,140 0 0,0 140,280 Z"/>
        </g>

      </g>
    </g>

    <!-- Separator lines between wedges -->
    <line x1="140" y1="4" x2="140" y2="96" stroke="#252540" stroke-width="1"/>
    <line x1="184" y1="140" x2="276" y2="140" stroke="#252540" stroke-width="1"/>
    <line x1="140" y1="184" x2="140" y2="276" stroke="#252540" stroke-width="1"/>
    <line x1="4" y1="140" x2="96" y2="140" stroke="#252540" stroke-width="1"/>

    <!-- Icons (positioned at center of each wedge arc) -->
    <!-- Home icon (top-left center: ~70, 70) -->
    <text class="wedge-icon" x="78" y="78" data-for="home">&#x2302;</text>

    <!-- Desktop icon (top-right center: ~210, 70) -->
    <text class="wedge-icon" x="202" y="78" data-for="desktop">&#x1F5B5;</text>

    <!-- Settings icon (bottom-right center: ~210, 210) -->
    <text class="wedge-icon" x="202" y="202" data-for="settings">&#x2699;</text>

    <!-- Screenshot icon (bottom-left center: ~70, 210) -->
    <text class="wedge-icon" x="78" y="202" data-for="screenshot">&#x1F4F7;</text>

    <!-- Center circle -->
    <circle class="center-bg" cx="140" cy="140" r="44"/>
    <text class="center-label" id="centerLabel" x="140" y="140"></text>
  </svg>

</div>

<script>
  var centerLabel = document.getElementById('centerLabel');

  function trayAction(name) {
    window.__clearxr_tray_pending = name;
    if (window.__clearxr_tray_action) {
      window.__clearxr_tray_action(name);
    }
  }

  // Wedge interactions
  var wedges = document.querySelectorAll('.wedge-group');
  for (var i = 0; i < wedges.length; i++) {
    (function(wedge) {
      wedge.addEventListener('mouseenter', function() {
        var label = wedge.getAttribute('data-label');
        centerLabel.textContent = label;
        centerLabel.classList.add('active');
      });

      wedge.addEventListener('mouseleave', function() {
        centerLabel.textContent = '';
        centerLabel.classList.remove('active');
      });

      wedge.addEventListener('click', function() {
        var action = wedge.getAttribute('data-action');
        trayAction(action);
      });
    })(wedges[i]);
  }
</script>

</body>
</html>

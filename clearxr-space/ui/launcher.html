<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>ClearXR Launcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d1a;
    --surface: #16213e;
    --surface-hover: #1a2a4f;
    --accent: #00e5ff;
    --accent-dim: #00a0b0;
    --text: #e0e0e0;
    --text-muted: #7a8ba0;
    --card-radius: 8px;
  }

  body {
    width: 1024px;
    height: 640px;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
  }

  /* ---- Header ---- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: linear-gradient(180deg, #111128 0%, var(--bg) 100%);
    border-bottom: 2px solid var(--accent);
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .logo .clear { color: var(--accent); }
  .logo .xr { color: #ff44cc; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .game-count {
    color: var(--text-muted);
    font-size: 13px;
  }

  .search {
    background: var(--surface);
    border: 1px solid #2a3a5c;
    border-radius: 6px;
    color: var(--text);
    padding: 6px 12px;
    font-size: 13px;
    width: 180px;
    outline: none;
  }
  .search:focus {
    border-color: var(--accent);
  }
  .search::placeholder {
    color: var(--text-muted);
  }

  /* ---- Game Grid ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 18px 24px;
    overflow-y: auto;
    max-height: 570px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--card-radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    border: 1px solid transparent;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0, 229, 255, 0.15);
    border-color: var(--accent-dim);
    background: var(--surface-hover);
  }
  .card:active {
    transform: translateY(0px);
    border-color: var(--accent);
  }

  .card-art {
    width: 100%;
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,255,255,0.12);
    letter-spacing: 3px;
  }

  /* Color palette for card art backgrounds */
  .card:nth-child(8n+1) .card-art { background: linear-gradient(135deg, #0f3d6b, #1a5a8a); }
  .card:nth-child(8n+2) .card-art { background: linear-gradient(135deg, #531c4c, #7a2d6e); }
  .card:nth-child(8n+3) .card-art { background: linear-gradient(135deg, #1b4d3e, #2a7a5e); }
  .card:nth-child(8n+4) .card-art { background: linear-gradient(135deg, #4a350a, #6a5020); }
  .card:nth-child(8n+5) .card-art { background: linear-gradient(135deg, #3d0c0c, #6a1a1a); }
  .card:nth-child(8n+6) .card-art { background: linear-gradient(135deg, #0c2d48, #1a4a6a); }
  .card:nth-child(8n+7) .card-art { background: linear-gradient(135deg, #2d1b4e, #4a2d7a); }
  .card:nth-child(8n+8) .card-art { background: linear-gradient(135deg, #1a3a1a, #2d5a2d); }

  .card-info {
    padding: 8px 10px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-source {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ---- Launch overlay ---- */
  .card .launch-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 229, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .card:hover .launch-overlay {
    opacity: 1;
  }
  .launch-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 6px 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }

  /* ---- Empty state ---- */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
  }
  .empty-state h2 {
    font-size: 18px;
    margin-bottom: 8px;
    color: var(--text);
  }
  .empty-state p {
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span class="clear">CLEAR</span><span class="xr">XR</span></div>
  <div class="header-right">
    <span class="game-count" id="gameCount">0 games</span>
    <input class="search" type="text" placeholder="Search games..." id="searchBox">
  </div>
</div>

<div class="grid" id="gameGrid">
  <!-- Cards injected by JS -->
</div>

<script>
  // Game data will be injected from Rust via: window.GAMES = [...]
  // Each game: { app_id: number, name: string, install_dir: string, source: string }

  function renderGames(filter) {
    const grid = document.getElementById('gameGrid');
    const countEl = document.getElementById('gameCount');
    const games = (window.GAMES || []);
    const filtered = filter
      ? games.filter(g => g.name.toLowerCase().includes(filter.toLowerCase()))
      : games;

    countEl.textContent = filtered.length + ' game' + (filtered.length !== 1 ? 's' : '');

    if (filtered.length === 0 && games.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <h2>No games detected</h2>
          <p>Install Steam or add custom game paths in settings.</p>
        </div>`;
      return;
    }

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <h2>No matches</h2>
          <p>Try a different search term.</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(g => `
      <div class="card" data-appid="${g.app_id}" onclick="launchGame(${g.app_id})">
        <div class="card-art">${g.name.substring(0, 2).toUpperCase()}</div>
        <div class="card-info">
          <div class="card-title">${g.name}</div>
          <div class="card-source">${g.source}</div>
        </div>
        <div class="launch-overlay">
          <button class="launch-btn">Launch</button>
        </div>
      </div>
    `).join('');
  }

  function launchGame(appId) {
    // Called from Rust via JS bridge — sends app_id back
    if (window.__clearxr_launch) {
      window.__clearxr_launch(appId);
    }
  }

  // Search filtering
  document.getElementById('searchBox').addEventListener('input', function(e) {
    renderGames(e.target.value);
  });

  // Initial render with placeholder data if no games injected yet
  if (!window.GAMES) {
    window.GAMES = [
      { app_id: 1, name: "Half-Life: Alyx", install_dir: "", source: "Steam" },
      { app_id: 2, name: "Beat Saber", install_dir: "", source: "Steam" },
      { app_id: 3, name: "Boneworks", install_dir: "", source: "Steam" },
      { app_id: 4, name: "Pavlov VR", install_dir: "", source: "Steam" },
      { app_id: 5, name: "VTOL VR", install_dir: "", source: "Steam" },
      { app_id: 6, name: "Blade & Sorcery", install_dir: "", source: "Steam" },
      { app_id: 7, name: "Into the Radius", install_dir: "", source: "Steam" },
      { app_id: 8, name: "Pistol Whip", install_dir: "", source: "Steam" },
    ];
  }
  renderGames();
</script>

</body>
</html>

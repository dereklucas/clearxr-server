<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>ClearXR Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a14;
    --surface: #13132a;
    --surface-hover: #1a1a3a;
    --accent: #4a9eff;
    --accent-dim: #3578cc;
    --accent-glow: rgba(74, 158, 255, 0.25);
    --text: #e4e4ee;
    --text-muted: #6a7088;
    --border: #252540;
    --card-radius: 10px;
    --transition: 0.18s ease;
  }

  body {
    width: 800px;
    height: 600px;
    overflow: hidden;
    background: var(--bg);
    font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ---- Header ---- */
  .header {
    flex-shrink: 0;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1.5px;
  }
  .logo .clear { color: #e4e4ee; }
  .logo .xr { color: var(--accent); }

  .page-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-muted);
    padding-left: 14px;
    border-left: 1px solid var(--border);
  }

  /* ---- Divider ---- */
  .divider {
    flex-shrink: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #252540 15%, #252540 85%, transparent);
    margin: 0 28px;
  }

  /* ---- Scrollable content ---- */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px 20px 28px;
    scrollbar-width: thin;
    scrollbar-color: #252540 transparent;
  }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: #252540; border-radius: 3px; }

  /* ---- Section ---- */
  .section {
    margin-bottom: 24px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--accent);
    white-space: nowrap;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ---- Row (label + control) ---- */
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 48px;
    padding: 6px 0;
  }

  .row + .row {
    border-top: 1px solid rgba(37, 37, 64, 0.5);
  }

  .row-label {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    flex-shrink: 0;
    padding-right: 20px;
  }

  .row-hint {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .row-control {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  /* ---- Toggle switch ---- */
  .toggle {
    position: relative;
    width: 56px;
    height: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 9px 0;
  }

  .toggle input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-track {
    width: 56px;
    height: 30px;
    background: #2a2a44;
    border-radius: 15px;
    position: relative;
    transition: background var(--transition);
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 24px;
    height: 24px;
    background: #555568;
    border-radius: 50%;
    transition: transform var(--transition), background var(--transition);
  }

  .toggle input:checked + .toggle-track {
    background: var(--accent-dim);
  }

  .toggle input:checked + .toggle-track::after {
    transform: translateX(26px);
    background: #fff;
  }

  /* ---- Dropdown ---- */
  .dropdown {
    height: 40px;
    min-width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    padding: 0 12px;
    outline: none;
    cursor: pointer;
    transition: border-color var(--transition);
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%236a7088'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
  }

  .dropdown:focus {
    border-color: var(--accent-dim);
  }

  .dropdown option {
    background: var(--surface);
    color: var(--text);
  }

  /* ---- Slider ---- */
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider {
    -webkit-appearance: none;
    appearance: none;
    width: 180px;
    height: 6px;
    background: #2a2a44;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(74, 158, 255, 0.3);
    transition: transform var(--transition);
  }

  .slider::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }

  .slider::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--accent);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(74, 158, 255, 0.3);
  }

  .slider-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    min-width: 42px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ---- Save button ---- */
  .footer {
    flex-shrink: 0;
    padding: 12px 28px 16px 28px;
    display: flex;
    justify-content: flex-end;
  }

  .save-btn {
    height: 48px;
    padding: 0 48px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(74, 158, 255, 0.3);
    transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
  }

  .save-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
    background: #5aabff;
  }

  .save-btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 8px rgba(74, 158, 255, 0.2);
  }

  .save-btn.saved {
    background: #2ecc71;
    box-shadow: 0 4px 16px rgba(46, 204, 113, 0.3);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo"><span class="clear">CLEAR</span><span class="xr">XR</span></div>
    <span class="page-title">Settings</span>
  </div>
</div>

<div class="divider"></div>

<div class="content">

  <!-- Shell -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Shell</span>
      <span class="section-line"></span>
    </div>

    <div class="row">
      <div>
        <div class="row-label">Default View</div>
        <div class="row-hint">Which view to show on startup</div>
      </div>
      <div class="row-control">
        <select id="default_view" class="dropdown">
          <option value="launcher">Launcher</option>
          <option value="desktop">Desktop</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <div class="row-label">Haptic Feedback</div>
        <div class="row-hint">Controller vibration on interactions</div>
      </div>
      <div class="row-control">
        <label class="toggle">
          <input type="checkbox" id="haptics_enabled" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Display -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Display</span>
      <span class="section-line"></span>
    </div>

    <div class="row">
      <div>
        <div class="row-label">Panel Opacity</div>
        <div class="row-hint">Transparency of content panels</div>
      </div>
      <div class="row-control">
        <div class="slider-wrap">
          <input type="range" id="panel_opacity" class="slider" min="50" max="100" value="95">
          <span class="slider-value" id="panel_opacity_val">95%</span>
        </div>
      </div>
    </div>

    <div class="row">
      <div>
        <div class="row-label">Show FPS</div>
        <div class="row-hint">Display frame rate counter</div>
      </div>
      <div class="row-control">
        <label class="toggle">
          <input type="checkbox" id="show_fps" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

</div>

<div class="divider"></div>

<div class="footer">
  <button class="save-btn" id="save_btn" onclick="saveConfig()">Save</button>
</div>

<script>
  // Load config values injected by the shell via window.CONFIG
  function loadConfig() {
    var c = window.CONFIG;
    if (!c) return;

    if (c.default_view) {
      document.getElementById('default_view').value = c.default_view;
    }
    if (typeof c.panel_opacity === 'number') {
      var pct = Math.round(c.panel_opacity * 100);
      document.getElementById('panel_opacity').value = pct;
      document.getElementById('panel_opacity_val').textContent = pct + '%';
    }
    if (typeof c.show_fps === 'boolean') {
      document.getElementById('show_fps').checked = c.show_fps;
    }
    if (typeof c.haptics_enabled === 'boolean') {
      document.getElementById('haptics_enabled').checked = c.haptics_enabled;
    }
  }

  // Gather current control values into a JSON-serialisable object
  function gatherConfig() {
    return {
      default_view: document.getElementById('default_view').value,
      panel_opacity: parseInt(document.getElementById('panel_opacity').value, 10) / 100,
      show_fps: document.getElementById('show_fps').checked,
      haptics_enabled: document.getElementById('haptics_enabled').checked
    };
  }

  // Save: write JSON to the bridge variable polled by the shell
  function saveConfig() {
    var config = gatherConfig();
    window.__clearxr_pending_save = JSON.stringify(config);

    var btn = document.getElementById('save_btn');
    btn.textContent = 'Saved';
    btn.classList.add('saved');
    setTimeout(function() {
      btn.textContent = 'Save';
      btn.classList.remove('saved');
    }, 1500);
  }

  // Slider live value display
  document.getElementById('panel_opacity').addEventListener('input', function() {
    document.getElementById('panel_opacity_val').textContent = this.value + '%';
  });

  // Apply config values once the page is ready
  // (window.CONFIG is set before the first paint by the shell)
  setTimeout(loadConfig, 50);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>ORBIT RING — VR Game Launcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 640px;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 80%, #1a1a2e 0%, #0a0a14 60%, #050508 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Subtle starfield dots */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 120px 80px, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 300px 150px, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 520px 60px, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 700px 200px, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 850px 100px, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 180px 300px, rgba(255,255,255,0.1), transparent),
      radial-gradient(1px 1px at 600px 350px, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 950px 280px, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 50px 400px, rgba(255,255,255,0.12), transparent),
      radial-gradient(1px 1px at 400px 500px, rgba(255,255,255,0.1), transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* Orbit glow on the ground plane */
  .orbit-glow {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 160px;
    background: radial-gradient(ellipse, rgba(100, 140, 255, 0.08) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
  }

  /* Ring container */
  .ring-scene {
    position: absolute;
    width: 1024px;
    height: 640px;
    top: 0;
    left: 0;
    perspective: 900px;
    perspective-origin: 50% 55%;
    z-index: 2;
  }

  .ring {
    position: absolute;
    width: 0;
    height: 0;
    left: 512px;
    top: 340px;
    transform-style: preserve-3d;
  }

  .card {
    position: absolute;
    transform-origin: center center;
    transition: all 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
    cursor: pointer;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  }

  .card img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    pointer-events: none;
  }

  .card .card-shine {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none;
  }

  .card.front .card-shine {
    border-color: rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .card.front {
    z-index: 10;
    filter: brightness(1) saturate(1.1);
  }

  .card.near {
    z-index: 5;
    filter: brightness(0.5) saturate(0.7);
  }

  .card.far {
    z-index: 2;
    filter: brightness(0.25) saturate(0.4);
  }

  .card.back {
    z-index: 1;
    filter: brightness(0.1) saturate(0.2);
    pointer-events: none;
  }

  /* Front card title */
  .front-title {
    position: absolute;
    left: 50%;
    bottom: 68px;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .front-title .name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    white-space: nowrap;
  }

  .front-title .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Navigation arrows */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 30;
    transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .nav-arrow:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
  }

  .nav-arrow.left { left: 30px; }
  .nav-arrow.right { right: 30px; }

  .nav-arrow svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: rgba(255,255,255,0.6);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Detail overlay */
  .detail-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .detail-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .detail-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(5, 5, 10, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .detail-panel {
    position: relative;
    width: 720px;
    border-radius: 20px;
    background: rgba(20, 20, 35, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    transform: scale(0.92) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }

  .detail-overlay.active .detail-panel {
    transform: scale(1) translateY(0);
  }

  .detail-hero {
    width: 100%;
    height: 240px;
    position: relative;
    overflow: hidden;
  }

  .detail-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .detail-hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(transparent, rgba(20, 20, 35, 0.95));
  }

  .detail-body {
    padding: 28px 36px 32px;
  }

  .detail-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin-bottom: 10px;
  }

  .detail-meta {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }

  .detail-tag {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.06);
    padding: 4px 12px;
    border-radius: 20px;
  }

  .detail-desc {
    font-size: 14px;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    margin-bottom: 28px;
    max-width: 580px;
  }

  .detail-actions {
    display: flex;
    gap: 14px;
  }

  .btn-launch {
    padding: 14px 48px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #4a6cf7, #6366f1);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(74, 108, 247, 0.3);
  }

  .btn-launch:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(74, 108, 247, 0.45);
  }

  .btn-launch:active {
    transform: translateY(0);
  }

  .btn-back {
    padding: 14px 28px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .btn-back:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
  }

  /* Dot indicators */
  .dots {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 20;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.4s, transform 0.4s;
  }

  .dot.active {
    background: rgba(255,255,255,0.6);
    transform: scale(1.3);
  }
</style>
</head>
<body>

<div class="orbit-glow"></div>

<div class="ring-scene">
  <div class="ring" id="ring"></div>
</div>

<div class="front-title" id="frontTitle">
  <div class="name" id="frontName"></div>
  <div class="hint">click to view details</div>
</div>

<div class="nav-arrow left" id="navLeft">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</div>
<div class="nav-arrow right" id="navRight">
  <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
</div>

<div class="dots" id="dots"></div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-backdrop" id="detailBackdrop"></div>
  <div class="detail-panel">
    <div class="detail-hero">
      <img id="detailImg" src="" alt="">
    </div>
    <div class="detail-body">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-desc" id="detailDesc"></div>
      <div class="detail-actions">
        <button class="btn-launch" id="btnLaunch">LAUNCH</button>
        <button class="btn-back" id="btnBack">Back</button>
      </div>
    </div>
  </div>
</div>

<script>
const games = [
  {
    id: 546560, name: 'Half-Life: Alyx',
    tags: ['FPS', 'VR Exclusive'],
    desc: 'Set between Half-Life and Half-Life 2, Alyx Vance and her father Eli mount an early resistance to the Combine\'s brutal occupation of Earth. A full-length VR masterpiece from Valve.'
  },
  {
    id: 620980, name: 'Beat Saber',
    tags: ['Rhythm', 'Music'],
    desc: 'Slash the beats of adrenaline-pumping music as they fly towards you, surrounded by a futuristic world. The ultimate VR rhythm game experience.'
  },
  {
    id: 823500, name: 'BONEWORKS',
    tags: ['Action', 'Physics'],
    desc: 'An experimental physics VR adventure. Use physics-driven interaction with yourweapons, enemies, and the environment to fight through a mysterious narrative.'
  },
  {
    id: 555160, name: 'Blade & Sorcery',
    tags: ['Combat', 'Sandbox'],
    desc: 'A medieval fantasy sandbox built exclusively for VR. Become a mighty warrior using an advanced physics-driven combat system.'
  },
  {
    id: 617830, name: 'SUPERHOT VR',
    tags: ['FPS', 'Puzzle'],
    desc: 'Time moves only when you move. Blurring the lines between strategy and shooter, SUPERHOT VR reimagines the iconic gameplay for virtual reality.'
  },
  {
    id: 418650, name: 'Space Pirate Trainer',
    tags: ['Arcade', 'Shooter'],
    desc: 'The classic VR arcade shooter. Grab your blasters and dodge, duck, and blast waves of droids on a platform high above a sci-fi city.'
  },
  {
    id: 611670, name: 'Pavlov VR',
    tags: ['FPS', 'Multiplayer'],
    desc: 'A multiplayer VR shooter with realistic weapon handling. Competitive and casual game modes with an active community and mod support.'
  },
  {
    id: 916840, name: 'Pistol Whip',
    tags: ['Rhythm', 'Shooter'],
    desc: 'An unstoppable action-rhythm FPS. Journey through a cinematic bullet hell powered by a breakneck soundtrack from a diverse lineup of artists.'
  }
];

const CARD_W = 300;
const CARD_H = 140;
const RING_RADIUS = 380;
const TOTAL = games.length;
const ANGLE_STEP = 360 / TOTAL;

let currentIndex = 0;
let animating = false;
const ring = document.getElementById('ring');
const frontTitle = document.getElementById('frontTitle');
const frontName = document.getElementById('frontName');
const dotsContainer = document.getElementById('dots');

function artUrl(appId) {
  return `https://cdn.akamai.steamstatic.com/steam/apps/${appId}/header.jpg`;
}

// Create cards
const cards = games.map((game, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<img src="${artUrl(game.id)}" alt="${game.name}"><div class="card-shine"></div>`;
  card.dataset.index = i;
  card.addEventListener('click', () => onCardClick(i));
  ring.appendChild(card);
  return card;
});

// Create dots
games.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dotsContainer.appendChild(dot);
});
const dots = dotsContainer.querySelectorAll('.dot');

function positionCards() {
  cards.forEach((card, i) => {
    let offset = i - currentIndex;
    // Wrap to shortest path
    if (offset > TOTAL / 2) offset -= TOTAL;
    if (offset < -TOTAL / 2) offset += TOTAL;

    const angle = offset * ANGLE_STEP;
    const absOffset = Math.abs(offset);

    // Scale and size
    let scale, w, h, opacity, className;
    if (absOffset === 0) {
      scale = 1;
      w = CARD_W;
      h = CARD_H;
      className = 'front';
    } else if (absOffset === 1) {
      scale = 0.6;
      w = CARD_W * 0.6;
      h = CARD_H * 0.6;
      className = 'near';
    } else if (absOffset === 2) {
      scale = 0.42;
      w = CARD_W * 0.42;
      h = CARD_H * 0.42;
      className = 'far';
    } else {
      scale = 0.3;
      w = CARD_W * 0.3;
      h = CARD_H * 0.3;
      className = 'back';
    }

    const rad = (angle * Math.PI) / 180;
    const x = Math.sin(rad) * RING_RADIUS;
    const z = Math.cos(rad) * RING_RADIUS - RING_RADIUS;
    const yOffset = absOffset === 0 ? -30 : 0;

    card.style.width = w + 'px';
    card.style.height = h + 'px';
    card.style.left = (-w / 2) + 'px';
    card.style.top = (-h / 2) + 'px';
    card.style.transform = `translate3d(${x}px, ${yOffset}px, ${z}px) rotateY(${-angle}deg)`;
    card.style.zIndex = 10 - absOffset;
    card.className = 'card ' + className;
  });

  // Update title
  frontName.textContent = games[currentIndex].name;

  // Update dots
  dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
}

function rotate(dir) {
  if (animating) return;
  animating = true;
  currentIndex = (currentIndex + dir + TOTAL) % TOTAL;
  positionCards();
  setTimeout(() => { animating = false; }, 620);
}

function onCardClick(i) {
  if (animating) return;
  let offset = i - currentIndex;
  if (offset > TOTAL / 2) offset -= TOTAL;
  if (offset < -TOTAL / 2) offset += TOTAL;

  if (offset === 0) {
    openDetail(i);
  } else {
    rotate(offset > 0 ? 1 : -1);
  }
}

// Navigation arrows
document.getElementById('navLeft').addEventListener('click', () => rotate(-1));
document.getElementById('navRight').addEventListener('click', () => rotate(1));

// Detail view
const detailOverlay = document.getElementById('detailOverlay');
const detailImg = document.getElementById('detailImg');
const detailTitle = document.getElementById('detailTitle');
const detailMeta = document.getElementById('detailMeta');
const detailDesc = document.getElementById('detailDesc');

function openDetail(i) {
  const game = games[i];
  detailImg.src = artUrl(game.id);
  detailTitle.textContent = game.name;
  detailMeta.innerHTML = game.tags.map(t => `<span class="detail-tag">${t}</span>`).join('');
  detailDesc.textContent = game.desc;
  detailOverlay.classList.add('active');
  frontTitle.style.opacity = '0';
}

function closeDetail() {
  detailOverlay.classList.remove('active');
  frontTitle.style.opacity = '1';
}

document.getElementById('btnBack').addEventListener('click', closeDetail);
document.getElementById('detailBackdrop').addEventListener('click', closeDetail);
document.getElementById('btnLaunch').addEventListener('click', () => {
  const game = games[currentIndex];
  alert(`Launching ${game.name}...`);
});

// Init
positionCards();
</script>
</body>
</html>

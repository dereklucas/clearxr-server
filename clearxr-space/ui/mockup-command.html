<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>ClearXR Command Palette</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 640px;
    overflow: hidden;
    background: rgba(10, 12, 18, 0.12);
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    color: #d0d4dc;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 100px;
  }

  .palette {
    width: 580px;
    background: rgba(16, 20, 28, 0.82);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    box-shadow:
      0 0 0 1px rgba(0, 229, 255, 0.06),
      0 24px 80px rgba(0, 0, 0, 0.5),
      0 2px 16px rgba(0, 0, 0, 0.3);
    overflow: hidden;
  }

  .search-wrap {
    padding: 16px 16px 0 16px;
  }

  .search-input {
    width: 100%;
    height: 48px;
    background: rgba(255, 255, 255, 0.04);
    border: 1.5px solid rgba(0, 229, 255, 0.3);
    border-radius: 8px;
    padding: 0 16px;
    font-family: inherit;
    font-size: 16px;
    color: #eef0f4;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .search-input::placeholder {
    color: rgba(255, 255, 255, 0.25);
  }

  .search-input:focus {
    border-color: rgba(0, 229, 255, 0.55);
    box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08), 0 0 20px rgba(0, 229, 255, 0.06);
  }

  .section-label {
    padding: 12px 20px 6px 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.22);
  }

  .results {
    padding: 8px 8px 10px 8px;
  }

  .result-row {
    display: flex;
    align-items: center;
    height: 44px;
    padding: 0 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
    gap: 12px;
  }

  .result-row:hover {
    background: rgba(255, 255, 255, 0.03);
  }

  .result-row.selected {
    background: rgba(0, 229, 255, 0.08);
  }

  .result-row.selected .game-name {
    color: #ffffff;
  }

  .game-icon {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    flex-shrink: 0;
  }

  .game-name {
    flex: 1;
    font-size: 14px;
    color: #b8bcc6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .source-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
  }

  .kbd-hint {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.15);
    flex-shrink: 0;
    min-width: 20px;
    text-align: right;
  }

  .divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.04);
    margin: 4px 16px;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 8px 16px 10px 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    font-size: 11px;
    color: rgba(255, 255, 255, 0.16);
  }

  .footer kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    font-family: inherit;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.25);
    margin: 0 2px;
  }

  .launch-flash .result-row.selected {
    background: rgba(0, 229, 255, 0.25);
    transition: background 0.05s;
  }

  .launch-flash .result-row.selected .game-name {
    color: #00e5ff;
  }
</style>
</head>
<body>

<div class="palette" id="palette">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search games..." autofocus spellcheck="false" autocomplete="off">
  </div>
  <div id="resultsContainer"></div>
  <div class="footer">
    <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate</span>
    <span><kbd>Enter</kbd> launch</span>
    <span><kbd>Esc</kbd> dismiss</span>
  </div>
</div>

<script>
const GAMES = [
  { name: 'Half-Life: Alyx',             color: '#e8731e', source: 'Steam'   },
  { name: 'Beat Saber',                  color: '#e6234a', source: 'Steam'   },
  { name: 'BONEWORKS',                   color: '#4a90d9', source: 'Steam'   },
  { name: 'Asgard\'s Wrath 2',          color: '#8b5cf6', source: 'Meta'    },
  { name: 'Pistol Whip',                 color: '#f59e0b', source: 'Steam'   },
  { name: 'The Walking Dead: Saints & Sinners', color: '#22c55e', source: 'Steam' },
  { name: 'SUPERHOT VR',                 color: '#ef4444', source: 'Steam'   },
  { name: 'Blade & Sorcery',            color: '#6366f1', source: 'Steam'   },
];

const RECENT_INDICES = [0, 1, 3]; // Half-Life: Alyx, Beat Saber, Asgard's Wrath 2

let selectedIndex = 0;
let currentResults = [];

function renderResults(query) {
  const container = document.getElementById('resultsContainer');
  let html = '';

  if (!query) {
    // Show Recent + All Games
    const recentGames = RECENT_INDICES.map(i => GAMES[i]);
    const allGames = GAMES;

    html += '<div class="section-label">Recent</div>';
    html += '<div class="results">';
    recentGames.forEach((g, i) => {
      html += rowHTML(g, i);
    });
    html += '</div>';
    html += '<div class="divider"></div>';
    html += '<div class="section-label">All Games</div>';
    html += '<div class="results">';
    allGames.slice(0, 6).forEach((g, i) => {
      html += rowHTML(g, i + recentGames.length);
    });
    html += '</div>';

    currentResults = [...recentGames, ...allGames.slice(0, 6)];
  } else {
    const q = query.toLowerCase();
    const filtered = GAMES.filter(g => g.name.toLowerCase().includes(q)).slice(0, 6);
    currentResults = filtered;

    if (filtered.length === 0) {
      html += '<div class="results" style="padding:20px;text-align:center;">';
      html += '<span style="color:rgba(255,255,255,0.2);font-size:13px;">No games found</span>';
      html += '</div>';
    } else {
      html += '<div class="results">';
      filtered.forEach((g, i) => {
        html += rowHTML(g, i);
      });
      html += '</div>';
    }
  }

  container.innerHTML = html;

  if (selectedIndex >= currentResults.length) {
    selectedIndex = Math.max(0, currentResults.length - 1);
  }
  updateSelection();
}

function rowHTML(game, index) {
  const kbdNum = index < 9 ? index + 1 : '';
  const kbdLabel = kbdNum ? `\u2318${kbdNum}` : '';
  return `<div class="result-row" data-index="${index}" onmouseenter="hoverSelect(${index})" onclick="launchGame()">
    <div class="game-icon" style="background:${game.color}"></div>
    <div class="game-name">${escapeHTML(game.name)}</div>
    <div class="source-badge">${game.source}</div>
    <div class="kbd-hint">${kbdLabel}</div>
  </div>`;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateSelection() {
  document.querySelectorAll('.result-row').forEach(row => {
    const i = parseInt(row.dataset.index);
    row.classList.toggle('selected', i === selectedIndex);
  });
}

function hoverSelect(index) {
  selectedIndex = index;
  updateSelection();
}

function launchGame() {
  if (currentResults.length === 0) return;
  const palette = document.getElementById('palette');
  palette.classList.add('launch-flash');
  setTimeout(() => palette.classList.remove('launch-flash'), 200);
}

document.getElementById('searchInput').addEventListener('input', function() {
  selectedIndex = 0;
  renderResults(this.value.trim());
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (currentResults.length > 0) {
      selectedIndex = (selectedIndex + 1) % currentResults.length;
      updateSelection();
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (currentResults.length > 0) {
      selectedIndex = (selectedIndex - 1 + currentResults.length) % currentResults.length;
      updateSelection();
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    launchGame();
  }
});

// Initial render
renderResults('');
</script>

</body>
</html>

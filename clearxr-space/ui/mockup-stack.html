<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>CLEARXR — Game Library</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    width: 1024px;
    height: 640px;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* ── CLEARXR MARK ── */
  .mark {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    z-index: 100;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* ── LIST VIEW ── */
  #list-view {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding-top: 44px;
  }

  .stack-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 0 0 0;
  }

  /* thin custom scrollbar */
  .stack-scroll::-webkit-scrollbar { width: 4px; }
  .stack-scroll::-webkit-scrollbar-track { background: transparent; }
  .stack-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  .stack-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  /* ── GAME STRIP ── */
  .strip {
    position: relative;
    width: 100%;
    height: 108px;
    cursor: pointer;
    overflow: hidden;
    transition: height 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                filter 0.25s ease;
    filter: brightness(0.78);
    border-left: 3px solid transparent;
    flex-shrink: 0;
  }

  .strip:hover {
    height: 124px;
    filter: brightness(1);
    border-left-color: #00e5ff;
  }

  .strip-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 0.4s ease;
  }

  .strip:hover .strip-bg {
    transform: scale(1.03);
  }

  /* gradient overlay: transparent left, dark right for text */
  .strip-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(10,10,15,0) 0%,
      rgba(10,10,15,0.35) 40%,
      rgba(10,10,15,0.85) 70%,
      rgba(10,10,15,0.95) 100%
    );
  }

  /* bottom divider line */
  .strip::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  .strip-content {
    position: absolute;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    text-align: right;
    z-index: 2;
  }

  .strip-title {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
    line-height: 1.2;
    margin-bottom: 6px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  .strip-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.08);
    padding: 3px 8px;
    border-radius: 3px;
  }

  /* ── DETAIL VIEW ── */
  #detail-view {
    display: none;
    flex-direction: column;
    height: 100%;
    background: #0a0a0f;
  }

  #detail-view.active {
    display: flex;
  }

  #list-view.hidden {
    display: none;
  }

  .detail-banner {
    position: relative;
    width: 100%;
    height: 320px;
    background-size: cover;
    background-position: center top;
    flex-shrink: 0;
  }

  .detail-banner-fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 160px;
    background: linear-gradient(to top, #0a0a0f 0%, transparent 100%);
  }

  .detail-body {
    flex: 1;
    padding: 0 40px 32px 40px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    margin-top: -40px;
    z-index: 2;
    position: relative;
  }

  .detail-title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    line-height: 1.1;
  }

  .detail-meta {
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 16px;
    font-weight: 500;
  }

  .detail-desc {
    font-size: 14px;
    line-height: 1.65;
    color: rgba(255,255,255,0.6);
    max-width: 560px;
    margin-bottom: 32px;
  }

  .detail-actions {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .btn-launch {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #00e5ff;
    color: #0a0a0f;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 48px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
  }

  .btn-launch:hover {
    background: #33ecff;
    transform: scale(1.03);
  }

  .btn-launch:active {
    transform: scale(0.98);
  }

  .btn-back {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: color 0.2s ease;
    background: none;
    border: none;
    padding: 8px 0;
  }

  .btn-back:hover {
    color: rgba(255,255,255,0.8);
  }

  /* fade-in animation */
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-body > * {
    animation: fadeSlideUp 0.35s ease forwards;
  }
  .detail-body > *:nth-child(1) { animation-delay: 0.05s; }
  .detail-body > *:nth-child(2) { animation-delay: 0.1s; }
  .detail-body > *:nth-child(3) { animation-delay: 0.15s; }
  .detail-body > *:nth-child(4) { animation-delay: 0.2s; }
</style>
</head>
<body>

<div class="mark">CLEARXR</div>

<!-- LIST VIEW -->
<div id="list-view">
  <div class="stack-scroll" id="stack"></div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view">
  <div class="detail-banner" id="detail-banner">
    <div class="detail-banner-fade"></div>
  </div>
  <div class="detail-body">
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-meta" id="detail-meta"></div>
    <div class="detail-desc" id="detail-desc"></div>
    <div class="detail-actions">
      <button class="btn-launch" onclick="launchGame()">Launch</button>
      <button class="btn-back" onclick="showList()">Back</button>
    </div>
  </div>
</div>

<script>
const games = [
  {
    appid: 546560,
    title: "Half-Life: Alyx",
    desc: "Lean around a deck to take a shot. Rummage through shelves to find a healing syringe and some ammo. Manipulate tools to hack alien interfaces. Toss a bottle through a window to distract an enemy. Rip a headcrab off your face and throw it at a Combine soldier.",
    genre: "Action / Adventure"
  },
  {
    appid: 620980,
    title: "Beat Saber",
    desc: "Beat Saber is a VR rhythm game where you slash the beats of adrenaline-pumping music as they fly towards you, surrounded by a futuristic world.",
    genre: "Rhythm / Music"
  },
  {
    appid: 823500,
    title: "BONEWORKS",
    desc: "An experimental physics VR adventure. Use physics-driven interaction, advanced combat mechanics, and innovative game design to fight your way through a mysterious virtual world.",
    genre: "Action / Physics"
  },
  {
    appid: 555160,
    title: "Blade & Sorcery",
    desc: "A medieval fantasy sandbox built exclusively for VR. Become a powerful warrior, mage, or rogue with full physics-driven melee, magic, and ranged combat.",
    genre: "Combat / Sandbox"
  },
  {
    appid: 617830,
    title: "SUPERHOT VR",
    desc: "Time moves only when you move. Blurring the lines between strategy and action, SUPERHOT VR is the definitive VR experience reimagined from the ground up.",
    genre: "Action / Strategy"
  },
  {
    appid: 418650,
    title: "Space Pirate Trainer",
    desc: "Pick up your blasters, put on your shield, and battle waves of relentless drones in the ultimate space arcade. The classic VR arcade shooter.",
    genre: "Arcade / Shooter"
  },
  {
    appid: 611670,
    title: "Pavlov VR",
    desc: "Pavlov VR is a multiplayer shooter in VR with heavy focus on community features. Realistic reloading, large community of custom game modes, and competitive matchmaking.",
    genre: "FPS / Multiplayer"
  },
  {
    appid: 916840,
    title: "Pistol Whip",
    desc: "Pistol Whip is an unstoppable action-rhythm FPS. Journey through a cinematic bullet hell powered by a breakneck soundtrack to become the ultimate action hero.",
    genre: "Rhythm / Shooter"
  }
];

function headerUrl(appid) {
  return `https://cdn.akamai.steamstatic.com/steam/apps/${appid}/header.jpg`;
}

// Build list
const stack = document.getElementById("stack");
games.forEach((g, i) => {
  const strip = document.createElement("div");
  strip.className = "strip";
  strip.innerHTML = `
    <div class="strip-bg" style="background-image: url('${headerUrl(g.appid)}')"></div>
    <div class="strip-overlay"></div>
    <div class="strip-content">
      <div class="strip-title">${g.title}</div>
      <span class="strip-badge">Steam</span>
    </div>
  `;
  strip.addEventListener("click", () => showDetail(i));
  stack.appendChild(strip);
});

function showDetail(index) {
  const g = games[index];
  document.getElementById("detail-banner").style.backgroundImage = `url('${headerUrl(g.appid)}')`;
  document.getElementById("detail-title").textContent = g.title;
  document.getElementById("detail-meta").textContent = `${g.genre}  ·  Steam`;
  document.getElementById("detail-desc").textContent = g.desc;

  document.getElementById("list-view").classList.add("hidden");
  document.getElementById("detail-view").classList.add("active");
}

function showList() {
  document.getElementById("detail-view").classList.remove("active");
  document.getElementById("list-view").classList.remove("hidden");
}

function launchGame() {
  const title = document.getElementById("detail-title").textContent;
  console.log(`Launching: ${title}`);
}
</script>
</body>
</html>

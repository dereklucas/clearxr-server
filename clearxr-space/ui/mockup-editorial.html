<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>ClearXR — Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0c0e;
    --text: #e8e4df;
    --text-dim: #8a8580;
    --text-muted: #5a5652;
    --gold: #c9a96e;
    --gold-dim: #a08550;
    --surface: #141416;
    --border: #1e1e22;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html, body {
    width: 1024px;
    height: 640px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 24px 32px 0 32px;
    flex-shrink: 0;
  }

  .header-brand {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .header-nav {
    display: flex;
    gap: 28px;
    align-items: baseline;
  }

  .header-nav span {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.3s;
  }

  .header-nav span:hover,
  .header-nav span.active {
    color: var(--text);
  }

  .header-rule {
    margin: 16px 32px 0 32px;
    border: none;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    padding: 16px 32px 12px 32px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  /* ── GRID VIEW ── */
  .grid-view {
    flex: 1;
    padding: 0 32px 24px 32px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .grid-view::-webkit-scrollbar { width: 3px; }
  .grid-view::-webkit-scrollbar-track { background: transparent; }
  .grid-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .masonry {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: auto;
    gap: 18px;
  }

  .card {
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .card:hover {
    transform: translateY(-2px);
  }

  .card.featured {
    grid-column: span 2;
    grid-row: span 2;
  }

  .card-image-wrap {
    position: relative;
    overflow: hidden;
    border-radius: 3px;
    background: var(--surface);
  }

  .card.featured .card-image-wrap {
    height: 320px;
  }

  .card:not(.featured) .card-image-wrap {
    height: 150px;
  }

  .card-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.88) saturate(0.9);
    transition: filter 0.4s ease, transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .card:hover .card-image-wrap img {
    filter: brightness(1) saturate(1);
    transform: scale(1.02);
  }

  .card-meta {
    padding: 10px 2px 0 2px;
  }

  .card.featured .card-meta {
    padding: 14px 4px 0 4px;
  }

  .card-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 14px;
    color: var(--text-dim);
    transition: color 0.3s;
    line-height: 1.3;
  }

  .card.featured .card-title {
    font-size: 20px;
    color: var(--text);
  }

  .card:hover .card-title {
    color: #f5f0ea;
  }

  .card-source {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .card.featured .card-source {
    color: var(--gold-dim);
  }

  /* ── DETAIL VIEW ── */
  .detail-view {
    display: none;
    flex: 1;
    overflow: hidden;
  }

  .detail-view.active {
    display: flex;
    flex-direction: column;
  }

  .grid-view.hidden {
    display: none;
  }

  .section-label.hidden {
    display: none;
  }

  .detail-hero {
    position: relative;
    height: 340px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .detail-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.75) saturate(0.85);
  }

  .detail-hero-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 180px;
    background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
  }

  .detail-back {
    position: absolute;
    top: 20px;
    left: 28px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(232, 228, 223, 0.6);
    cursor: pointer;
    transition: color 0.3s;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .detail-back:hover {
    color: var(--text);
  }

  .detail-back svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }

  .detail-content {
    flex: 1;
    padding: 0 48px 32px 48px;
    margin-top: -40px;
    position: relative;
    z-index: 1;
    overflow-y: auto;
  }

  .detail-content::-webkit-scrollbar { width: 3px; }
  .detail-content::-webkit-scrollbar-track { background: transparent; }
  .detail-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-source-tag {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .detail-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 38px;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 16px;
  }

  .detail-divider {
    width: 48px;
    border: none;
    border-top: 1px solid var(--gold-dim);
    margin-bottom: 16px;
  }

  .detail-description {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--text-dim);
    max-width: 520px;
    margin-bottom: 28px;
  }

  .detail-meta-row {
    display: flex;
    gap: 40px;
    margin-bottom: 28px;
  }

  .detail-meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .detail-meta-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .detail-meta-value {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 15px;
    color: var(--text-dim);
  }

  .detail-actions {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .btn-launch {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 36px;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
  }

  .btn-launch:hover {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
  }

  .btn-launch svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
  }

  .btn-secondary {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.3s;
    background: none;
    border: none;
    font-family: var(--sans);
  }

  .btn-secondary:hover {
    color: var(--text-dim);
  }

  /* ── TRANSITIONS ── */
  .fade-in {
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">ClearXR</div>
  <nav class="header-nav">
    <span class="active">Library</span>
    <span>Recents</span>
    <span>Settings</span>
  </nav>
</div>
<hr class="header-rule">

<!-- SECTION LABEL -->
<div class="section-label" id="sectionLabel">Your Collection</div>

<!-- GRID VIEW -->
<div class="grid-view" id="gridView">
  <div class="masonry" id="masonry"></div>
</div>

<!-- DETAIL VIEW -->
<div class="detail-view" id="detailView">
  <div class="detail-hero">
    <img id="detailHeroImg" src="" alt="">
    <div class="detail-hero-gradient"></div>
    <div class="detail-back" id="backBtn">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </div>
  </div>
  <div class="detail-content fade-in">
    <div class="detail-source-tag">Source: Steam</div>
    <h1 class="detail-title" id="detailTitle"></h1>
    <hr class="detail-divider">
    <p class="detail-description" id="detailDesc"></p>
    <div class="detail-meta-row">
      <div class="detail-meta-item">
        <span class="detail-meta-label">Platform</span>
        <span class="detail-meta-value" id="detailPlatform"></span>
      </div>
      <div class="detail-meta-item">
        <span class="detail-meta-label">Genre</span>
        <span class="detail-meta-value" id="detailGenre"></span>
      </div>
      <div class="detail-meta-item">
        <span class="detail-meta-label">Rating</span>
        <span class="detail-meta-value" id="detailRating"></span>
      </div>
    </div>
    <div class="detail-actions">
      <button class="btn-launch" id="launchBtn">
        <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        Launch
      </button>
      <button class="btn-secondary">View on Steam</button>
    </div>
  </div>
</div>

<script>
const games = [
  {
    appid: 546560,
    title: "Half-Life: Alyx",
    desc: "Set between the events of Half-Life and Half-Life 2, Alyx Vance and her father Eli mount an early resistance to the Combine's brutal occupation of Earth. A full-length VR entry in the Half-Life series, built from the ground up for virtual reality.",
    genre: "Action / Adventure",
    platform: "SteamVR",
    rating: "Overwhelming"
  },
  {
    appid: 620980,
    title: "Beat Saber",
    desc: "Beat Saber is an immersive rhythm experience crafted for VR. Slash blooming beats with laser swords to the pulse of adrenaline-pumping electronic music.",
    genre: "Rhythm",
    platform: "SteamVR",
    rating: "Overwhelmingly Positive"
  },
  {
    appid: 823500,
    title: "BONEWORKS",
    desc: "An experimental physics-based VR adventure game. Explore a mysterious virtual world as you uncover its secrets through advanced VR interaction, physics puzzles, and combat.",
    genre: "Action / Simulation",
    platform: "SteamVR",
    rating: "Very Positive"
  },
  {
    appid: 555160,
    title: "Blade & Sorcery",
    desc: "A medieval fantasy sandbox built exclusively for VR. Become a powerful warrior, mage, or rogue, and fight your way through procedurally-generated dungeons with realistic physics-driven combat.",
    genre: "Action / RPG",
    platform: "SteamVR",
    rating: "Very Positive"
  },
  {
    appid: 617830,
    title: "SUPERHOT VR",
    desc: "Blurring the lines between cautious strategy and unbridled mayhem. Time moves only when you move. An iconic VR experience where every bullet, every enemy, and every moment demands your focus.",
    genre: "Action / Strategy",
    platform: "SteamVR",
    rating: "Overwhelmingly Positive"
  },
  {
    appid: 418650,
    title: "Space Pirate Trainer",
    desc: "Pick up your blasters, choose from an arsenal of weapons and power-ups, and see how long you can hold off relentless waves of droids. The ultimate VR arcade shooter.",
    genre: "Arcade / Shooter",
    platform: "SteamVR",
    rating: "Very Positive"
  },
  {
    appid: 611670,
    title: "Pavlov VR",
    desc: "A multiplayer VR shooter with realistic weapon handling and mechanics. Competitive and social, featuring community-created content and game modes that push the boundaries of virtual reality.",
    genre: "FPS / Multiplayer",
    platform: "SteamVR",
    rating: "Very Positive"
  },
  {
    appid: 916840,
    title: "Pistol Whip",
    desc: "An unstoppable action-rhythm FPS. Journey through a cinematic bullet hell powered by a breakneck soundtrack. Dodge, shoot, and flow through an onslaught of enemies.",
    genre: "Rhythm / Shooter",
    platform: "SteamVR",
    rating: "Very Positive"
  }
];

function headerUrl(appid) {
  return `https://cdn.akamai.steamstatic.com/steam/apps/${appid}/header.jpg`;
}

function portraitUrl(appid) {
  return `https://cdn.akamai.steamstatic.com/steam/apps/${appid}/library_600x900.jpg`;
}

// Build grid
const masonry = document.getElementById('masonry');
games.forEach((game, i) => {
  const card = document.createElement('div');
  card.className = i === 0 ? 'card featured' : 'card';
  card.innerHTML = `
    <div class="card-image-wrap">
      <img src="${i === 0 ? portraitUrl(game.appid) : headerUrl(game.appid)}" alt="${game.title}" loading="lazy">
    </div>
    <div class="card-meta">
      <div class="card-title">${game.title}</div>
      <div class="card-source">Steam</div>
    </div>
  `;
  card.addEventListener('click', () => openDetail(game));
  masonry.appendChild(card);
});

// Detail view
const gridView = document.getElementById('gridView');
const detailView = document.getElementById('detailView');
const sectionLabel = document.getElementById('sectionLabel');

function openDetail(game) {
  document.getElementById('detailHeroImg').src = headerUrl(game.appid);
  document.getElementById('detailTitle').textContent = game.title;
  document.getElementById('detailDesc').textContent = game.desc;
  document.getElementById('detailPlatform').textContent = game.platform;
  document.getElementById('detailGenre').textContent = game.genre;
  document.getElementById('detailRating').textContent = game.rating;

  gridView.classList.add('hidden');
  sectionLabel.classList.add('hidden');
  detailView.classList.add('active');

  // Re-trigger fade animation
  const content = detailView.querySelector('.detail-content');
  content.classList.remove('fade-in');
  void content.offsetWidth;
  content.classList.add('fade-in');
}

document.getElementById('backBtn').addEventListener('click', () => {
  detailView.classList.remove('active');
  gridView.classList.remove('hidden');
  sectionLabel.classList.remove('hidden');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>CLEARXR — Radial Wheel Launcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 640px;
    overflow: hidden;
    background: #080a10;
    font-family: 'Rajdhani', sans-serif;
    color: #c8d6e5;
    position: relative;
  }

  /* === BACKGROUND ATMOSPHERE === */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(20, 80, 160, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  /* === SCANLINE OVERLAY === */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* === WHEEL VIEW === */
  #wheel-view {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  #wheel-view.hidden {
    opacity: 0;
    transform: scale(0.9);
    pointer-events: none;
    position: absolute;
  }

  .wheel-container {
    position: relative;
    width: 540px;
    height: 540px;
  }

  /* === OUTER RING DECORATIONS === */
  .ring-deco {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(0, 180, 255, 0.1);
    pointer-events: none;
  }

  .ring-outer { width: 520px; height: 520px; border-color: rgba(0, 180, 255, 0.06); }
  .ring-main { width: 480px; height: 480px; border-color: rgba(0, 180, 255, 0.12); }
  .ring-inner { width: 200px; height: 200px; border-color: rgba(0, 180, 255, 0.15); }
  .ring-core { width: 160px; height: 160px; border-color: rgba(0, 180, 255, 0.08); }

  /* Tick marks around outer ring */
  .tick-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 500px;
    height: 500px;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .tick {
    position: absolute;
    top: 0;
    left: 50%;
    width: 1px;
    height: 12px;
    background: rgba(0, 180, 255, 0.15);
    transform-origin: 0 250px;
  }

  .tick.major {
    width: 2px;
    height: 20px;
    background: rgba(0, 180, 255, 0.3);
  }

  /* === WEDGE DIVIDER LINES === */
  .divider-line {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2px;
    height: 240px;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(0, 180, 255, 0.05) 30%,
      rgba(0, 180, 255, 0.15) 50%,
      rgba(0, 180, 255, 0.05) 80%,
      transparent 100%
    );
    transform-origin: top center;
    pointer-events: none;
  }

  /* === SVG PIE WEDGES === */
  .wedge-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 540px;
    height: 540px;
    pointer-events: none;
  }

  .wedge-hit {
    fill: transparent;
    stroke: none;
    pointer-events: all;
    cursor: pointer;
  }

  .wedge-fill {
    fill: rgba(10, 30, 60, 0.3);
    stroke: rgba(0, 180, 255, 0.08);
    stroke-width: 1;
    transition: fill 0.3s ease, stroke 0.3s ease;
    pointer-events: none;
  }

  .wedge-group:hover .wedge-fill {
    fill: rgba(0, 120, 255, 0.15);
    stroke: rgba(0, 200, 255, 0.4);
  }

  .wedge-group.active .wedge-fill {
    fill: rgba(0, 150, 255, 0.25);
    stroke: rgba(0, 220, 255, 0.6);
  }

  /* === GAME ITEMS ON THE RING === */
  .game-item {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    margin-left: -60px;
    margin-top: -45px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s ease, filter 0.3s ease;
    z-index: 10;
    pointer-events: none; /* hits handled by SVG */
  }

  .game-item .thumb-wrap {
    width: 100px;
    height: 47px;
    margin: 0 auto 6px;
    border-radius: 6px;
    overflow: hidden;
    border: 1.5px solid rgba(0, 180, 255, 0.15);
    transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
    position: relative;
  }

  .game-item .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.6) saturate(0.7);
    transition: filter 0.3s ease;
  }

  .game-item .thumb-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0, 180, 255, 0.05), transparent);
    pointer-events: none;
  }

  .game-item .game-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: rgba(160, 200, 240, 0.6);
    transition: color 0.3s ease;
    line-height: 1.2;
    max-width: 110px;
    margin: 0 auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Hover states driven by JS class */
  .game-item.hovered .thumb-wrap {
    border-color: rgba(0, 200, 255, 0.6);
    box-shadow: 0 0 20px rgba(0, 150, 255, 0.3), 0 0 40px rgba(0, 100, 255, 0.1);
    transform: scale(1.12);
  }

  .game-item.hovered .thumb-wrap img {
    filter: brightness(1) saturate(1.1);
  }

  .game-item.hovered .game-label {
    color: rgba(200, 240, 255, 1);
  }

  /* === CENTER HUB === */
  .center-hub {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 160px;
    height: 160px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: radial-gradient(circle, rgba(5, 15, 35, 0.95) 0%, rgba(5, 15, 35, 0.7) 100%);
    pointer-events: none;
  }

  .center-hub .center-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: rgba(0, 180, 255, 0.5);
    text-transform: uppercase;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .center-hub .center-game-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(0, 220, 255, 0.95);
    text-transform: uppercase;
    text-align: center;
    line-height: 1.3;
    padding: 0 10px;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s ease, transform 0.3s ease;
    position: absolute;
    max-width: 140px;
  }

  .center-hub .center-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2px;
    color: rgba(0, 180, 255, 0.3);
    text-transform: uppercase;
    margin-top: 4px;
    transition: opacity 0.3s ease;
  }

  .center-hub.has-hover .center-logo { opacity: 0; transform: scale(0.8); }
  .center-hub.has-hover .center-sub { opacity: 0; }
  .center-hub.has-hover .center-game-name { opacity: 1; transform: scale(1); }

  /* Pulsing dot in center */
  .center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    margin: -3px;
    border-radius: 50%;
    background: rgba(0, 200, 255, 0.6);
    box-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
    animation: pulse-dot 2s ease-in-out infinite;
    pointer-events: none;
    z-index: 21;
    transition: opacity 0.3s ease;
  }

  .center-hub.has-hover + .center-dot { opacity: 0; }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.5); opacity: 1; }
  }

  /* === CORNER DECORATIONS === */
  .corner-deco {
    position: absolute;
    width: 60px;
    height: 60px;
    pointer-events: none;
    opacity: 0.15;
  }

  .corner-deco.tl { top: 20px; left: 20px; border-top: 2px solid #0af; border-left: 2px solid #0af; }
  .corner-deco.tr { top: 20px; right: 20px; border-top: 2px solid #0af; border-right: 2px solid #0af; }
  .corner-deco.bl { bottom: 20px; left: 20px; border-bottom: 2px solid #0af; border-left: 2px solid #0af; }
  .corner-deco.br { bottom: 20px; right: 20px; border-bottom: 2px solid #0af; border-right: 2px solid #0af; }

  /* Header */
  .header-bar {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    color: rgba(0, 180, 255, 0.3);
    text-transform: uppercase;
  }

  /* Footer */
  .footer-bar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 3px;
    color: rgba(100, 140, 180, 0.25);
    text-transform: uppercase;
  }

  /* === DETAIL VIEW === */
  #detail-view {
    position: absolute;
    inset: 0;
    background: rgba(4, 8, 16, 0.97);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    z-index: 50;
  }

  #detail-view.visible {
    opacity: 1;
    pointer-events: all;
  }

  .detail-card {
    width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: scale(0.92) translateY(15px);
    transition: transform 0.4s ease;
  }

  #detail-view.visible .detail-card {
    transform: scale(1) translateY(0);
  }

  .detail-art {
    width: 580px;
    height: 271px;
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid rgba(0, 180, 255, 0.2);
    box-shadow:
      0 0 40px rgba(0, 100, 200, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.5);
    margin-bottom: 24px;
    position: relative;
  }

  .detail-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .detail-art::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: linear-gradient(to top, rgba(4, 8, 16, 0.8), transparent);
  }

  .detail-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #e0f0ff;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }

  .detail-desc {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: rgba(160, 195, 230, 0.7);
    text-align: center;
    max-width: 500px;
    line-height: 1.5;
    margin-bottom: 28px;
  }

  .detail-buttons {
    display: flex;
    gap: 16px;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 14px 40px;
    border-radius: 6px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-launch {
    background: linear-gradient(135deg, rgba(0, 140, 255, 0.8), rgba(0, 80, 200, 0.9));
    color: #fff;
    box-shadow: 0 0 30px rgba(0, 120, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .btn-launch:hover {
    background: linear-gradient(135deg, rgba(0, 170, 255, 0.9), rgba(0, 100, 240, 1));
    box-shadow: 0 0 50px rgba(0, 150, 255, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  .btn-launch:active { transform: translateY(0); }

  .btn-back {
    background: rgba(30, 50, 80, 0.4);
    color: rgba(140, 180, 220, 0.8);
    border: 1px solid rgba(0, 180, 255, 0.15);
  }

  .btn-back:hover {
    background: rgba(40, 70, 110, 0.5);
    color: rgba(200, 230, 255, 1);
    border-color: rgba(0, 180, 255, 0.4);
  }

  /* Glow line under detail art */
  .detail-glow-line {
    width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 180, 255, 0.3), transparent);
    margin-bottom: 20px;
  }

  /* === AMBIENT PARTICLES === */
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(0, 180, 255, 0.3);
    border-radius: 50%;
    pointer-events: none;
    animation: float-particle linear infinite;
  }

  @keyframes float-particle {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-200px) translateX(30px); opacity: 0; }
  }

  /* === RING ROTATION ANIMATION === */
  @keyframes slow-rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }

  .ring-outer {
    animation: slow-rotate 120s linear infinite;
    border-style: dashed;
  }
</style>
</head>
<body>

<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>
<div class="header-bar">CLEARXR LIBRARY</div>
<div class="footer-bar">Select a title to view details</div>

<!-- WHEEL VIEW -->
<div id="wheel-view">
  <div class="wheel-container">
    <!-- Decorative rings -->
    <div class="ring-deco ring-outer"></div>
    <div class="ring-deco ring-main"></div>
    <div class="ring-deco ring-inner"></div>
    <div class="ring-deco ring-core"></div>

    <!-- Tick marks -->
    <div class="tick-ring" id="tick-ring"></div>

    <!-- SVG for pie wedges -->
    <svg class="wedge-svg" viewBox="0 0 540 540" id="wedge-svg"></svg>

    <!-- Divider lines between wedges -->
    <div id="dividers"></div>

    <!-- Game items positioned around the ring -->
    <div id="game-items"></div>

    <!-- Center hub -->
    <div class="center-hub" id="center-hub">
      <span class="center-logo">CLEARXR</span>
      <span class="center-sub">Select a game</span>
      <span class="center-game-name" id="center-game-name"></span>
    </div>
    <div class="center-dot" id="center-dot"></div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="detail-view">
  <div class="detail-card">
    <div class="detail-art">
      <img id="detail-img" src="" alt="">
    </div>
    <div class="detail-glow-line"></div>
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-desc" id="detail-desc"></div>
    <div class="detail-buttons">
      <button class="btn btn-back" onclick="showWheel()">Back</button>
      <button class="btn btn-launch" id="btn-launch">Launch</button>
    </div>
  </div>
</div>

<!-- Ambient particles -->
<div id="particles"></div>

<script>
const GAMES = [
  { appid: 546560, name: "Half-Life: Alyx",         desc: "Lean into a stunning VR return to the Half-Life universe, featuring world-class physics interactions and a gripping narrative." },
  { appid: 620980, name: "Beat Saber",              desc: "Slash through rhythmic beats in an immersive neon world. The definitive VR rhythm experience." },
  { appid: 823500, name: "BONEWORKS",                desc: "An experimental physics VR adventure with advanced interactions, combat, and puzzle solving." },
  { appid: 555160, name: "Phasmophobia",             desc: "Cooperative ghost hunting in VR. Use real equipment to detect paranormal activity in haunted locations." },
  { appid: 617830, name: "SUPERHOT VR",              desc: "Time moves only when you move. The iconic FPS mechanic reimagined for room-scale virtual reality." },
  { appid: 418650, name: "Space Pirate Trainer",     desc: "The original VR arcade shooter. Dodge, duck, and blast waves of droids on a futuristic launchpad." },
  { appid: 611670, name: "Blade & Sorcery",          desc: "A medieval fantasy sandbox with full-physics melee combat. Fight your way through dungeons and arenas." },
  { appid: 916840, name: "Pavlov VR",                desc: "Competitive multiplayer VR shooter with realistic gunplay, community maps, and multiple game modes." }
];

const CX = 270, CY = 270;
const RING_RADIUS = 200;
const INNER_RADIUS = 90;
const OUTER_RADIUS = 245;
const SLICE_ANGLE = Math.PI * 2 / 8;

function polarToCart(cx, cy, r, angle) {
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}

// Build wedge SVG paths
function buildWedgePath(index) {
  const startAngle = index * SLICE_ANGLE - Math.PI / 2 - SLICE_ANGLE / 2;
  const endAngle = startAngle + SLICE_ANGLE;
  const p1 = polarToCart(CX, CY, INNER_RADIUS, startAngle);
  const p2 = polarToCart(CX, CY, OUTER_RADIUS, startAngle);
  const p3 = polarToCart(CX, CY, OUTER_RADIUS, endAngle);
  const p4 = polarToCart(CX, CY, INNER_RADIUS, endAngle);
  const largeArc = SLICE_ANGLE > Math.PI ? 1 : 0;
  return `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y} A ${OUTER_RADIUS} ${OUTER_RADIUS} 0 ${largeArc} 1 ${p3.x} ${p3.y} L ${p4.x} ${p4.y} A ${INNER_RADIUS} ${INNER_RADIUS} 0 ${largeArc} 0 ${p1.x} ${p1.y} Z`;
}

// Create SVG wedges
const svgEl = document.getElementById('wedge-svg');
GAMES.forEach((game, i) => {
  const path = buildWedgePath(i);
  const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  group.classList.add('wedge-group');
  group.dataset.index = i;

  const fillPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  fillPath.setAttribute('d', path);
  fillPath.classList.add('wedge-fill');

  const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  hitPath.setAttribute('d', path);
  hitPath.classList.add('wedge-hit');

  group.appendChild(fillPath);
  group.appendChild(hitPath);
  svgEl.appendChild(group);

  hitPath.addEventListener('mouseenter', () => handleHover(i));
  hitPath.addEventListener('mouseleave', () => handleHoverEnd(i));
  hitPath.addEventListener('click', () => showDetail(i));
});

// Create divider lines
const dividersEl = document.getElementById('dividers');
for (let i = 0; i < 8; i++) {
  const angle = i * 45 - 90 - 22.5;
  const div = document.createElement('div');
  div.className = 'divider-line';
  div.style.transform = `rotate(${angle}deg)`;
  dividersEl.appendChild(div);
}

// Create game items around the ring
const itemsEl = document.getElementById('game-items');
GAMES.forEach((game, i) => {
  const angle = i * SLICE_ANGLE - Math.PI / 2;
  const x = CX + RING_RADIUS * Math.cos(angle);
  const y = CY + RING_RADIUS * Math.sin(angle);

  const item = document.createElement('div');
  item.className = 'game-item';
  item.dataset.index = i;
  item.style.transform = `translate(${x - CX}px, ${y - CY}px)`;

  item.innerHTML = `
    <div class="thumb-wrap">
      <img src="https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg" alt="${game.name}" loading="eager">
    </div>
    <div class="game-label">${game.name}</div>
  `;

  itemsEl.appendChild(item);
});

// Create tick marks
const tickRing = document.getElementById('tick-ring');
for (let i = 0; i < 72; i++) {
  const tick = document.createElement('div');
  tick.className = i % 9 === 0 ? 'tick major' : 'tick';
  tick.style.transform = `rotate(${i * 5}deg)`;
  tickRing.appendChild(tick);
}

// Create ambient particles
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 15; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = `${Math.random() * 1024}px`;
  p.style.top = `${300 + Math.random() * 340}px`;
  p.style.animationDuration = `${6 + Math.random() * 8}s`;
  p.style.animationDelay = `${Math.random() * 10}s`;
  p.style.width = `${1 + Math.random() * 2}px`;
  p.style.height = p.style.width;
  particlesEl.appendChild(p);
}

// Hover handlers
const centerHub = document.getElementById('center-hub');
const centerDot = document.getElementById('center-dot');
const centerGameName = document.getElementById('center-game-name');

function handleHover(index) {
  document.querySelectorAll('.game-item').forEach(el => el.classList.remove('hovered'));
  document.querySelectorAll('.wedge-group').forEach(el => el.classList.remove('active'));

  const item = document.querySelector(`.game-item[data-index="${index}"]`);
  const wedge = document.querySelector(`.wedge-group[data-index="${index}"]`);
  if (item) item.classList.add('hovered');
  if (wedge) wedge.classList.add('active');

  centerGameName.textContent = GAMES[index].name;
  centerHub.classList.add('has-hover');
}

function handleHoverEnd(index) {
  const item = document.querySelector(`.game-item[data-index="${index}"]`);
  const wedge = document.querySelector(`.wedge-group[data-index="${index}"]`);
  if (item) item.classList.remove('hovered');
  if (wedge) wedge.classList.remove('active');

  const anyHovered = document.querySelector('.game-item.hovered');
  if (!anyHovered) {
    centerHub.classList.remove('has-hover');
  }
}

// Detail view
function showDetail(index) {
  const game = GAMES[index];
  document.getElementById('detail-img').src = `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/header.jpg`;
  document.getElementById('detail-title').textContent = game.name;
  document.getElementById('detail-desc').textContent = game.desc;
  document.getElementById('btn-launch').onclick = () => {
    alert(`Launching ${game.name}...`);
  };

  document.getElementById('wheel-view').classList.add('hidden');
  document.getElementById('detail-view').classList.add('visible');
}

function showWheel() {
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('wheel-view').classList.remove('hidden');
}
</script>
</body>
</html>

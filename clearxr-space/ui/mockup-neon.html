<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>CLEARXR Neon Shelf</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 640px;
    overflow: hidden;
    background: #08080f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: #ccc;
    position: relative;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px 8px;
  }

  .header .brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    color: #333;
  }

  .header .count {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    color: #333;
  }

  .shelf {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
    padding: 10px 24px 16px;
    height: calc(640px - 44px);
  }

  .game-cell {
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform 0.2s ease;
    position: relative;
  }

  .game-cell:hover {
    transform: scale(1.03);
    z-index: 2;
  }

  .game-cell .art-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 460 / 215;
    overflow: hidden;
    border-radius: 2px;
  }

  .game-cell .art-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .game-cell .glow {
    position: absolute;
    bottom: -4px;
    left: 5%;
    right: 5%;
    height: 8px;
    border-radius: 0 0 4px 4px;
    filter: blur(8px);
    opacity: 0.7;
    transition: opacity 0.2s ease, filter 0.2s ease;
    pointer-events: none;
  }

  .game-cell:hover .glow {
    opacity: 1;
    filter: blur(12px);
    height: 12px;
  }

  .game-cell .art-wrap {
    box-shadow: 0 4px 16px var(--neon-shadow);
    transition: box-shadow 0.2s ease;
  }

  .game-cell:hover .art-wrap {
    box-shadow: 0 4px 28px var(--neon-shadow-intense);
  }

  .game-cell .title {
    font-size: 11px;
    font-weight: 500;
    margin-top: 6px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Detail overlay */
  .detail-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(4, 4, 8, 0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  .detail-overlay.active {
    display: flex;
  }

  .detail-art {
    width: 520px;
    border-radius: 2px;
    box-shadow: 0 0 40px var(--detail-glow);
    margin-bottom: 20px;
  }

  .detail-title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .detail-desc {
    font-size: 13px;
    color: #777;
    margin-bottom: 24px;
    text-align: center;
    max-width: 500px;
  }

  .detail-launch {
    padding: 14px 56px;
    border: none;
    border-radius: 3px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    color: #08080f;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }

  .detail-launch:hover {
    transform: scale(1.04);
  }

  .detail-back {
    margin-top: 18px;
    font-size: 12px;
    color: #555;
    cursor: pointer;
    letter-spacing: 1px;
    border: none;
    background: none;
    font-family: inherit;
  }

  .detail-back:hover {
    color: #888;
  }

  .detail-neon-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="header">
  <div class="brand">CLEARXR</div>
  <div class="count">8 GAMES</div>
</div>

<div class="shelf" id="shelf"></div>

<div class="detail-overlay" id="detail">
  <img class="detail-art" id="detail-art" src="" alt="">
  <div class="detail-title" id="detail-title"></div>
  <div class="detail-desc" id="detail-desc"></div>
  <button class="detail-launch" id="detail-launch">LAUNCH</button>
  <button class="detail-back" id="detail-back">BACK</button>
  <div class="detail-neon-line" id="detail-line"></div>
</div>

<script>
const games = [
  { appid: 546560, title: "Half-Life: Alyx",        neon: "#ff6a00", desc: "Valve's flagship VR adventure set between Half-Life and Half-Life 2." },
  { appid: 620980, title: "Beat Saber",             neon: "#ff0055", desc: "Slash blocks to the beat of adrenaline-pumping music." },
  { appid: 823500, title: "BONEWORKS",              neon: "#00aaff", desc: "Experimental physics VR adventure from Stress Level Zero." },
  { appid: 555160, title: "Blade & Sorcery",        neon: "#8b00ff", desc: "Medieval fantasy sandbox with full physics-driven melee combat." },
  { appid: 617830, title: "SUPERHOT VR",            neon: "#ff2200", desc: "Time moves only when you move. The most innovative shooter in years." },
  { appid: 418650, title: "Space Pirate Trainer",   neon: "#00ff88", desc: "The original VR arcade shooter. Dodge, duck, and blast droids." },
  { appid: 611670, title: "Pavlov VR",              neon: "#ffaa00", desc: "Multiplayer VR shooter with competitive and community modes." },
  { appid: 916840, title: "Pistol Whip",            neon: "#ff00aa", desc: "Cinematic rhythm FPS — shoot to the beat, dodge bullets in style." },
];

const shelf = document.getElementById("shelf");

games.forEach((g, i) => {
  const cell = document.createElement("div");
  cell.className = "game-cell";
  cell.style.setProperty("--neon-shadow", g.neon + "66");
  cell.style.setProperty("--neon-shadow-intense", g.neon + "aa");

  cell.innerHTML = `
    <div class="art-wrap">
      <img src="https://cdn.akamai.steamstatic.com/steam/apps/${g.appid}/header.jpg" alt="${g.title}" loading="lazy">
      <div class="glow" style="background: ${g.neon};"></div>
    </div>
    <div class="title" style="color: ${g.neon};">${g.title}</div>
  `;

  cell.addEventListener("click", () => openDetail(g));
  shelf.appendChild(cell);
});

const overlay = document.getElementById("detail");
const detailArt = document.getElementById("detail-art");
const detailTitle = document.getElementById("detail-title");
const detailDesc = document.getElementById("detail-desc");
const detailLaunch = document.getElementById("detail-launch");
const detailLine = document.getElementById("detail-line");

function openDetail(g) {
  detailArt.src = `https://cdn.akamai.steamstatic.com/steam/apps/${g.appid}/header.jpg`;
  detailArt.style.boxShadow = `0 0 40px ${g.neon}55, 0 0 80px ${g.neon}22`;
  detailTitle.textContent = g.title;
  detailTitle.style.color = g.neon;
  detailDesc.textContent = g.desc;
  detailLaunch.style.background = g.neon;
  detailLaunch.style.boxShadow = `0 0 20px ${g.neon}88`;
  detailLine.style.background = `linear-gradient(90deg, transparent, ${g.neon}, transparent)`;
  overlay.style.setProperty("--detail-glow", g.neon + "44");
  overlay.classList.add("active");
}

document.getElementById("detail-back").addEventListener("click", () => {
  overlay.classList.remove("active");
});

overlay.addEventListener("click", (e) => {
  if (e.target === overlay) overlay.classList.remove("active");
});
</script>
</body>
</html>

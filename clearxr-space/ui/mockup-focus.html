<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>VR Game Launcher — Focus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 640px;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  .viewport {
    position: relative;
    width: 1024px;
    height: 640px;
    overflow: hidden;
    border-radius: 16px;
  }

  /* Game slides */
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  .slide-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #111;
  }

  /* Fallback gradient when image fails */
  .slide-bg.failed {
    background-image: none !important;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }

  /* Bottom gradient for text legibility */
  .slide-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40%;
    background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
  }

  /* Game info */
  .slide-info {
    position: absolute;
    bottom: 48px;
    left: 80px;
    right: 80px;
    text-align: center;
  }

  .game-title {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 1px 3px rgba(0,0,0,0.6);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .game-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .launch-btn {
    display: inline-block;
    padding: 14px 56px;
    background: rgba(255,255,255,0.92);
    color: #111;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .launch-btn:hover {
    background: #fff;
    transform: scale(1.04);
  }

  .launch-btn:active {
    transform: scale(0.97);
  }

  /* Navigation arrows */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    z-index: 10;
    transition: color 0.15s, background 0.15s;
    border-radius: 8px;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-arrow:hover {
    color: rgba(255,255,255,0.95);
    background: rgba(255,255,255,0.08);
  }

  .nav-arrow.left {
    left: 4px;
  }

  .nav-arrow.right {
    right: 4px;
  }

  /* Position dots */
  .dots {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }

  .dot.active {
    background: #fff;
    transform: scale(1.3);
  }

  .dot:hover:not(.active) {
    background: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>
<div class="viewport">

  <div class="nav-arrow left" onclick="prev()">&#8249;</div>
  <div class="nav-arrow right" onclick="next()">&#8250;</div>

  <div id="slides"></div>

  <div class="dots" id="dots"></div>

</div>

<script>
const games = [
  { appid: 546560, title: "Half-Life: Alyx",           desc: "Lean in, reach out, and manipulate the world with your hands in VR." },
  { appid: 620980, title: "Beat Saber",                desc: "Slash the beats as they fly towards you in a neon-lit world." },
  { appid: 823500, title: "BONEWORKS",                  desc: "Experimental physics-driven VR adventure from Stress Level Zero." },
  { appid: 555160, title: "Phasmophobia",              desc: "Cooperative ghost hunting with VR-enabled paranormal investigation." },
  { appid: 617830, title: "SUPERHOT VR",               desc: "Time moves only when you move. The most innovative shooter in years." },
  { appid: 418650, title: "Space Pirate Trainer DX",   desc: "The original VR arcade shooter — dodge and blast in zero gravity." },
  { appid: 611670, title: "Blade & Sorcery",           desc: "Medieval fantasy sandbox with physics-driven melee combat in VR." },
  { appid: 916840, title: "Stormland",                 desc: "Explore, upgrade, and fight through a lush open world built for VR." }
];

let current = 0;
const slidesEl = document.getElementById('slides');
const dotsEl = document.getElementById('dots');

// Build slides
games.forEach((game, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide' + (i === 0 ? ' active' : '');
  slide.innerHTML = `
    <div class="slide-bg" style="background-image: url('https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/capsule_616x353.jpg')"></div>
    <div class="slide-gradient"></div>
    <div class="slide-info">
      <div class="game-title">${game.title}</div>
      <div class="game-desc">${game.desc}</div>
      <button class="launch-btn" onclick="launch(${i})">Launch</button>
    </div>
  `;
  slidesEl.appendChild(slide);

  // Handle image load failure
  const img = new Image();
  img.onerror = () => {
    slide.querySelector('.slide-bg').classList.add('failed');
  };
  img.src = `https://cdn.akamai.steamstatic.com/steam/apps/${game.appid}/capsule_616x353.jpg`;

  // Dot
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dotsEl.appendChild(dot);
});

function goTo(idx) {
  if (idx === current) return;
  const slides = slidesEl.querySelectorAll('.slide');
  const dots = dotsEl.querySelectorAll('.dot');
  slides[current].classList.remove('active');
  dots[current].classList.remove('active');
  current = idx;
  slides[current].classList.add('active');
  dots[current].classList.add('active');
}

function next() {
  goTo((current + 1) % games.length);
}

function prev() {
  goTo((current - 1 + games.length) % games.length);
}

function launch(idx) {
  console.log('Launch:', games[idx].title, '(' + games[idx].appid + ')');
}
</script>
</body>
</html>
